name: GitHub Metrics Manual
on:
  workflow_dispatch: 

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: theclumsypirate
          template: classic
          
          # 'packages' va afișa pachetul tău Docker
          # 'activity' va afișa statisticile de commit
          base: header, activity, repositories, packages
          
          # Curățăm elementele sociale și data update-ului
          base_metadata: no
          repositories_stats: no
          
          # Configurație pentru Commit-uri (All time & Year)
          plugin_activity: yes
          plugin_activity_limit: 0
          plugin_activity_days: 365
          plugin_activity_filter: commit
          
          # Design Tokyonight
          config_timezone: Europe/Bucharest
          theme: tokyonight
          filename: github-metrics.svg
