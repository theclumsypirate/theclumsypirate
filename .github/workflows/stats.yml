name: Metrics Manual Update
on:
  workflow_dispatch: # Allows manual trigger only

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your Personal Access Token (stored in Secrets)
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Options
          user: theclumsypirate
          template: classic
          base: header, activity, community, repositories, metadata
          
          # Specific plugins for "Streak" style data
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_days: 14
          
          # Privacy settings
          config_timezone: Europe/Bucharest
          # This ensures it can see your private data via the token
          config_display: large
          
          # Output file name
          filename: github-metrics.svg
          
