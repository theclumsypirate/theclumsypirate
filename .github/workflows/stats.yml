name: GitHub Metrics Manual
on:
  workflow_dispatch: 

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: theclumsypirate
          template: classic
          
          # Am scos 'community' din listă
          base: header, activity, repositories, metadata
          
          # Setări vizuale
          config_timezone: Europe/Bucharest
          theme: tokyonight
          
          # Numele fișierului salvat
          filename: github-metrics.svg
