name: GitHub Metrics Manual
on:
  workflow_dispatch: 

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: theclumsypirate
          template: classic
          
          # Afișăm doar Header (nume), Activity (commits) și Repositories
          base: header, activity, repositories
          
          # Eliminăm complet datele de social/community
          base_metadata: no
          repositories_stats: no
          
          # Plugin Activity configurat pentru Commits (All time & Year)
          plugin_activity: yes
          plugin_activity_limit: 0
          plugin_activity_days: 365
          plugin_activity_filter: commit
          
          # Design și Culori
          config_timezone: Europe/Bucharest
          theme: tokyonight
          filename: github-metrics.svg
