name: GitHub Metrics Manual
on:
  workflow_dispatch: 

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: theclumsypirate
          template: classic
          
          # Păstrăm doar ce contează: cine ești, pachete și total commit-uri
          base: header, repositories, packages, activity
          
          # BLOCĂM DEFINITIV: stars, forks, watchers, sponsors și metadata
          base_metadata: no
          base_subscribing: no
          repositories_stats: no
          
          # OPRIM plugin-ul de activitate recentă (cel care genera eroarea)
          plugin_activity: no
          
          # Design Tokyonight
          config_timezone: Europe/Bucharest
          theme: tokyonight
          filename: github-metrics.svg
