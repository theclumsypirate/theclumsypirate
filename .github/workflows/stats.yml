
name: GitHub Metrics Manual
on:
  workflow_dispatch: 

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: theclumsypirate
          template: classic
          # Am scos plugin_habits care dădea eroare și am lăsat doar baza curată
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Bucharest
          theme: tokyonight
          filename: github-metrics.svg
