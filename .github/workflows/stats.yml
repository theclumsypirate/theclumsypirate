name: GitHub Metrics Manual
on:
  workflow_dispatch: 

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: theclumsypirate
          template: classic
          
          # 'base: header, repositories' arată doar numele și nr. de repo-uri
          base: header, repositories
          
          # Dezactivăm specific restul elementelor pentru a fi compact
          base_header: yes
          base_repositories: yes
          base_metadata: no
          
          # Eliminăm detaliile de community (stars, forks, etc.)
          repositories_stats: no
          
          # Setări vizuale (Tokyonight)
          config_timezone: Europe/Bucharest
          theme: tokyonight
          config_padding: 6%
          
          # Numele fișierului
          filename: github-metrics.svg
