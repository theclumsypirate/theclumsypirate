name: GitHub Metrics Manual
on:
  workflow_dispatch: 

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: theclumsypirate
          template: classic
          
          # 'metadata' este cel care afișează "Last updated", deci l-am scos
          # 'repositories' afișează numărul de repo-uri și contribuțiile
          base: header, repositories
          
          # Setări vizuale
          config_timezone: Europe/Bucharest
          theme: tokyonight
          filename: github-metrics.svg
